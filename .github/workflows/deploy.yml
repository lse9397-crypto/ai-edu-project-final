name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라올 때 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # index.html 파일 내의 REPLACE_WITH_API_KEY를 실제 비밀 키로 교체합니다.
          sed -i "s/REPLACE_WITH_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
